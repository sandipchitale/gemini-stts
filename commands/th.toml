prompt = """
## Step 1:

!{EXT=$(node -e "const os=require('os'),fs=require('fs'),p=require('path');const d=p.join(os.homedir(),'.gemini/extensions/gemini-stts');const m=JSON.parse(fs.readFileSync(p.join(d,'.gemini-extension-install.json'),'utf8'));console.log(m.type==='link'?m.source:d)") && node "$EXT/dist/stt.mjs" --start-recording {{args}} }

## Step 2: If the above command returned an empty string or exited with a non-zero status, exit the loop. Do not output anything at all.

## Step 3: Output the returned prompt to the output as is.

## Step 4: Speak the response

Do not output model response to the output. Do not include any Markdown formatting, code blocks, or special characters in the response - just plain readable text. Write the response to '/tmp/gemini_cli_response.txt'.

```
EXT=$(node -e "const os=require('os'),fs=require('fs'),p=require('path');const d=p.join(os.homedir(),'.gemini/extensions/gemini-stts');const m=JSON.parse(fs.readFileSync(p.join(d,'.gemini-extension-install.json'),'utf8'));console.log(m.type==='link'?m.source:d)") && cat /tmp/gemini_cli_response.txt | node "$EXT/dist/tts.mjs" --oneshot
```

## Step 5

**MANDATORY** Return to let user enter the next prompt.
"""